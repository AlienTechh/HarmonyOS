<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>HarmonyOS Fluid Emulator</title>
    <style>
        :root {
            --hw-blue: #007dff;
            --hw-panel-light: #f1f3f5;
            --hw-text-dark: #1a1a1a;
            --hw-text-muted: #8a8a8f;
            --hw-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Slower, premium easing curves (1.2s) for deep smoothness testing */
            --smooth-app: transform 1.2s cubic-bezier(0.15, 1, 0.2, 1), opacity 1s cubic-bezier(0.15, 1, 0.2, 1);
            --smooth-desktop: transform 1.2s cubic-bezier(0.15, 1, 0.2, 1), opacity 1s cubic-bezier(0.15, 1, 0.2, 1);
        }

        html, body {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--hw-font);
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        .phone-frame {
            width: 300px;
            height: 610px;
            background-color: #0d0d0d;
            border-radius: 40px;
            padding: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 
                        inset 0 0 2px 1.5px rgba(255, 255, 255, 0.15);
            position: relative;
            border: 2.5px solid #2a2a2a;
        }

        .screen {
            width: 100%;
            height: 100%;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            background-color: #050508;
            perspective: 800px;
        }

        .wallpaper-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.huaweicentral.com/wp-content/uploads/2021/06/Huawei-HarmonyOS-wallpaper-1.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            transform: scale(1);
            transition: var(--smooth-desktop);
        }

        .desktop {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-bottom: 40px; 
            transform: scale(1);
            opacity: 1;
            transition: var(--smooth-desktop);
        }

        .status-bar {
            height: 32px;
            padding: 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: -0.1px;
            width: 100%;
        }

        .status-left { display: flex; align-items: center; }
        .status-icons { display: flex; gap: 5px; }
        .scrollable-apps-area { flex: 1; display: flex; flex-direction: column; gap: 14px; }

        .home-screen {
            padding: 20px 14px 4px 14px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px 8px;
            align-content: start;
        }

        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .app-icon-wrapper:active { transform: scale(0.92); }

        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }

        .settings-icon {
            background: linear-gradient(135deg, #abb1b6 0%, #ffffff 100%);
            box-shadow: inset 0 -1px 2px rgba(0,0,0,0.1);
        }
        .settings-icon svg { width: 24px; height: 24px; fill: #444c56; }
        .dummy-icon-blue { background: linear-gradient(135deg, #4480ff 0%, #1153fc 100%); }
        .dummy-icon-green { background: linear-gradient(135deg, #40c057 0%, #2f9e44 100%); }
        .dummy-icon-orange { background: linear-gradient(135deg, #ff922b 0%, #f76707 100%); }
        .dummy-svg { width: 20px; height: 20px; fill: #ffffff; }

        .app-label {
            font-size: 9.5px;
            margin-top: 4px;
            text-align: center;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            max-width: 52px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--hw-panel-light);
            border-radius: 32px;
            z-index: 20;
            color: var(--hw-text-dark);
            padding-top: 32px;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: scale(0.1);
            pointer-events: none;
            transition: var(--smooth-app);
            will-change: transform, opacity;
        }

        .app-panel.open {
            opacity: 1;
            transform: scale(1) !important;
            pointer-events: auto;
        }

        .screen.app-active .wallpaper-container { transform: scale(1.08); }
        .screen.app-active .desktop { transform: scale(0.95); opacity: 0; pointer-events: none; }

        .app-header {
            padding: 14px 18px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .app-content { flex: 1; overflow-y: auto; padding: 0 10px; }
        .content-group { background-color: #ffffff; border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(0, 0, 0, 0.02); }
        .content-item { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f5; font-size: 12.5px; font-weight: 500; }
        .content-item:last-child { border-bottom: none; }
        .content-value { color: var(--hw-text-muted); font-size: 11px; }

        .navigation-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 40;
            touch-action: none;
            cursor: pointer;
        }

        .gesture-line {
            width: 80px;
            height: 4px;
            border-radius: 2px;
            background-color: rgba(255, 255, 255, 0.6);
            transition: background-color 0.3s;
            pointer-events: none;
        }

        .screen.app-active ~ .navigation-bar .gesture-line { background-color: rgba(0, 0, 0, 0.35); }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="screen" id="phoneScreen">
            
            <div class="wallpaper-container"></div>

            <div class="desktop" id="desktopContainer">
                <div class="scrollable-apps-area">
                    <div class="status-bar">
                        <div class="status-left"><span id="clock">10:08</span></div>
                        <div class="status-icons"><span>📶 5G</span><span>🔋 95%</span></div>
                    </div>

                    <div class="home-screen">
                        <div class="app-icon-wrapper" data-app-name="Settings" onpointerdown="openApplication(this)">
                            <div class="app-icon settings-icon">
                                <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.57-3-3.5s1.07-3.5 3-3.5 3 1.57 3 3.5-1.07 3.5-3 3.5z"/></svg>
                            </div>
                            <span class="app-label">Settings</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Gallery" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-blue"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></div>
                            <span class="app-label">Gallery</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Music" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-orange"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                            <span class="app-label">Music</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Market" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-green"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.1 0 2-.89 2-2V8c0-1.11-.89-2-2-2zM6 0h-4V4h4v2z"/></svg></div>
                            <span class="app-label">Market</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Browser" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-blue"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg></div>
                            <span class="app-label">Browser</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Phone" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-green"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
                            <span class="app-label">Phone</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Messages" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-blue"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
                            <span class="app-label">Messages</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Camera" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-orange"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M12 12m-3.2 0a3.2 3.2 0 1 0 6.4 0a3.2 3.2 0 1 0 -6.4 0M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/></svg></div>
                            <span class="app-label">Camera</span>
                        </div>

                        <div class="app-icon-wrapper" data-app-name="Files" onpointerdown="openApplication(this)">
                            <div class="app-icon dummy-icon-green"><svg class="dummy-svg" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
                            <span class="app-label">Files</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-panel" id="globalAppPanel">
                <div class="app-header" id="globalAppTitle">Application</div>
                <div class="app-content" id="globalAppContent"></div>
            </div>

            <div class="navigation-bar" id="navBar">
                <div class="gesture-line"></div>
            </div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const phoneScreen = document.getElementById('phoneScreen');
        const globalAppPanel = document.getElementById('globalAppPanel');
        const globalAppTitle = document.getElementById('globalAppTitle');
        const globalAppContent = document.getElementById('globalAppContent');
        const navBar = document.getElementById('navBar');
        
        let lastOpenedIconElement = null;
        let isAppWindowTargetOpen = false;

        const appDatabaseContent = {
            "Settings": `<div class="content-group"><div class="content-item"><span>Wi-Fi Network</span><span class="content-value">Connected &gt;</span></div><div class="content-item"><span>Bluetooth Mode</span><span class="content-value">Searching &gt;</span></div></div><div class="content-group"><div class="content-item"><span>System Version</span><span class="content-value">HarmonyOS Next v5.0</span></div></div>`,
            "Gallery": `<div class="content-group"><div class="content-item"><span>Camera Roll</span><span class="content-value">1,248 Items &gt;</span></div><div class="content-item"><span>Cloud Albums</span><span class="content-value">Synced Today &gt;</span></div></div>`,
            "Music": `<div class="content-group"><div class="content-item"><span>Current Track</span><span class="content-value">Now Playing Beats &gt;</span></div><div class="content-item"><span>Audio Stream Quality</span><span class="content-value">Lossless High-Fi &gt;</span></div></div>`,
            "Market": `<div class="content-group"><div class="content-item"><span>Updates Available</span><span class="content-value">3 Pending &gt;</span></div><div class="content-item"><span>Secured Verification</span><span class="content-value">Protected &gt;</span></div></div>`,
            "Browser": `<div class="content-group"><div class="content-item"><span>Homepage URL</span><span class="content-value">Huawei Core Live &gt;</span></div><div class="content-item"><span>Privacy Sandboxing</span><span class="content-value">Enabled &gt;</span></div></div>`,
            "Phone": `<div class="content-group"><div class="content-item"><span>Recent Calls</span><span class="content-value">Empty Log &gt;</span></div><div class="content-item"><span>Voicemail Inbox</span><span class="content-value">0 New Messages &gt;</span></div></div>`,
            "Messages": `<div class="content-group"><div class="content-item"><span>Direct Conversations</span><span class="content-value">No unread threads &gt;</span></div></div>`,
            "Camera": `<div class="content-group"><div class="content-item"><span>Resolution</span><span class="content-value">50MP Ultra-HD &gt;</span></div><div class="content-item"><span>Video Mode Capture</span><span class="content-value">4K 60FPS &gt;</span></div></div>`,
            "Files": `<div class="content-group"><div class="content-item"><span>Internal Disk</span><span class="content-value">128GB / 512GB Free &gt;</span></div><div class="content-item"><span>Downloads Cache</span><span class="content-value">Cleaned &gt;</span></div></div>`
        };

        // Capture current mid-animation style snapshot instantly to prevent state jumps
        function freezeCurrentState() {
            const computedStyle = window.getComputedStyle(globalAppPanel);
            const matrix = computedStyle.transform;
            
            globalAppPanel.style.transition = 'none';
            
            if (matrix && matrix !== 'none') {
                globalAppPanel.style.transform = matrix;
            }
            
            globalAppPanel.style.opacity = computedStyle.opacity;
            void globalAppPanel.offsetHeight; // force paint state sync
        }

        function openApplication(element) {
            // Used onpointerdown to completely bypass mobile touch latency delays
            if (isAppWindowTargetOpen && lastOpenedIconElement === element) {
                // If user spam clicks the SAME app while closing, immediately trap and reverse it
                freezeCurrentState();
                isAppWindowTargetOpen = true;
                
                globalAppPanel.style.transformOrigin = globalAppPanel.dataset.lastOrigin || 'center center';
                
                requestAnimationFrame(() => {
                    globalAppPanel.style.transition = '';
                    globalAppPanel.style.opacity = '1';
                    globalAppPanel.classList.add('open');
                    phoneScreen.classList.add('app-active');
                });
                return;
            }

            // Interrupt any previous app's animation state immediately
            freezeCurrentState();

            lastOpenedIconElement = element;
            isAppWindowTargetOpen = true;

            const appName = element.getAttribute('data-app-name');
            globalAppTitle.textContent = appName;
            globalAppContent.innerHTML = appDatabaseContent[appName] || `<div class="content-group"><div class="content-item"><span>Application Status</span><span class="content-value">Default Mode Live &gt;</span></div></div>`;

            const screenRect = phoneScreen.getBoundingClientRect();
            const iconRect = element.getBoundingClientRect();

            const originX = (iconRect.left + iconRect.width / 2) - screenRect.left;
            const originY = (iconRect.top + iconRect.height / 2) - screenRect.top;
            const originStyle = `${originX}px ${originY}px`;
            
            globalAppPanel.style.transformOrigin = originStyle;
            globalAppPanel.dataset.lastOrigin = originStyle; // cache origin coordinates

            // Set dynamic initial starting scale relative to parent frame size
            const initialScale = iconRect.width / screenRect.width;
            globalAppPanel.style.transform = `scale(${initialScale})`;
            globalAppPanel.style.opacity = '0';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    globalAppPanel.style.transition = '';
                    phoneScreen.classList.add('app-active');
                    globalAppPanel.classList.add('open');
                    globalAppPanel.style.opacity = '1';
                    globalAppPanel.style.transform = 'scale(1)';
                });
            });
        }

        function closeActiveApplication() {
            if (!lastOpenedIconElement) return;
            isAppWindowTargetOpen = false;

            freezeCurrentState();

            const screenRect = phoneScreen.getBoundingClientRect();
            const iconRect = lastOpenedIconElement.getBoundingClientRect();

            const originX = (iconRect.left + iconRect.width / 2) - screenRect.left;
            const originY = (iconRect.top + iconRect.height / 2) - screenRect.top;

            globalAppPanel.style.transformOrigin = `${originX}px ${originY}px`;
            globalAppPanel.classList.remove('open');
            phoneScreen.classList.remove('app-active');

            const targetScale = iconRect.width / screenRect.width;

            requestAnimationFrame(() => {
                globalAppPanel.style.transition = '';
                globalAppPanel.style.opacity = '0';
                globalAppPanel.style.transform = `scale(${targetScale})`;
            });
        }

        let startY = 0;
        let isSwiping = false;

        navBar.addEventListener('pointerdown', (e) => {
            startY = e.clientY;
            isSwiping = true;
            navBar.setPointerCapture(e.pointerId);
            e.preventDefault();
        });

        navBar.addEventListener('pointermove', (e) => {
            if (!isSwiping) return;
            let currentY = e.clientY;
            let diffY = startY - currentY;
            if (diffY > 15) { // Ultra-low swipe threshold for instantaneous response
                closeActiveApplication();
                isSwiping = false;
                navBar.releasePointerCapture(e.pointerId);
            }
        });

        navBar.addEventListener('pointerup', (e) => {
            isSwiping = false;
            try { navBar.releasePointerCapture(e.pointerId); } catch(err) {}
        });

        navBar.addEventListener('pointercancel', (e) => {
            isSwiping = false;
            try { navBar.releasePointerCapture(e.pointerId); } catch(err) {}
        });

        document.addEventListener('dblclick', (e) => { e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
